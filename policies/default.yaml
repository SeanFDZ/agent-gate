# Agent Gate Policy Definition
# Version: 0.1.0
# This file defines the complete authority envelope for an agent session.

schema_version: "0.1.0"

gate:
  name: "default-workspace"
  description: "Default Agent Gate policy with vault-backed rollback"

# --- ENVELOPE: Where the agent can operate ---
envelope:
  allowed_paths:
    - "${WORKDIR}/**"
  denied_paths:
    - "${HOME}/.ssh/**"
    - "${HOME}/.aws/**"
    - "${HOME}/.gnupg/**"
    - "${HOME}/.config/agent-gate/vault/**"
    - "/etc/**"
    - "/var/**"
    - "/usr/**"
    - "/tmp/.agent-gate-vault/**"

# --- VAULT: Agent-unreachable backup store ---
vault:
  path: "${HOME}/.config/agent-gate/vault"
  retention:
    max_snapshots_per_file: 20
    max_age_days: 30
  naming: "{original_path_hash}/{timestamp}_{filename}"
  on_failure: "deny"  # If backup fails, block the destructive action

# --- ACTION CLASSIFICATION ---
actions:
  destructive:
    description: "Actions that modify or destroy data. Trigger mandatory vault backup."
    patterns:
      - command: "rm"
        description: "File deletion"
      - command: "mv"
        description: "Move/rename — source path ceases to exist"
      - command: "truncate"
        description: "File truncation"
      - command: "write_file"
        condition: "target_exists"
        description: "Overwrite existing file"
      - command: "sed"
        args_contain: ["-i"]
        description: "In-place file edit"
      - command: "chmod"
        description: "Permission change — backup metadata"
      - command: "chown"
        description: "Ownership change — backup metadata"
      - command: "cp"
        condition: "target_exists"
        description: "Copy that overwrites existing target"

  read_only:
    description: "Non-mutating actions. Auto-allow within envelope."
    patterns:
      - command: "cat"
      - command: "ls"
      - command: "head"
      - command: "tail"
      - command: "grep"
      - command: "find"
      - command: "wc"
      - command: "diff"
      - command: "read_file"
      - command: "pwd"
      - command: "echo"
      - command: "tree"

  blocked:
    description: "Hard deny. No override without policy change."
    patterns:
      - command: "rm"
        args_contain: ["-rf /", "-rf ~", "-rf $HOME"]
        description: "Recursive force delete at root or home"
      - command: "mkfs"
        description: "Filesystem format"
      - command: "dd"
        description: "Raw disk write"
      - command: "curl"
        args_contain: ["| bash", "| sh"]
        description: "Piped remote execution"
      - command: "wget"
        args_contain: ["| bash", "| sh"]
        description: "Piped remote execution"
      - command: "shutdown"
        description: "System shutdown"
      - command: "reboot"
        description: "System reboot"

  network:
    description: "Network-capable commands. Default escalate — requires human approval."
    patterns:
      - command: "curl"
        description: "HTTP client — can download and exfiltrate data"
      - command: "wget"
        description: "HTTP download — can fetch remote payloads"
      - command: "nc"
        description: "Netcat — raw network connections"
      - command: "ssh"
        description: "Remote shell access"
      - command: "scp"
        description: "Remote file copy"
      - command: "rsync"
        description: "Remote file sync"
      - command: "ftp"
        description: "FTP client"
      - command: "sftp"
        description: "Secure FTP client"

# --- GATE BEHAVIOR ---
gate_behavior:
  on_destructive:
    - "extract_target_paths"
    - "verify_paths_in_envelope"
    - "snapshot_targets_to_vault"
    - "log_action"
    - "allow_execution"

  on_read_only:
    - "verify_paths_in_envelope"
    - "allow_execution"

  on_blocked:
    - "deny_execution"
    - "log_attempt"
    - "return_denial_reason"

  on_network:
    default: "escalate"
    message: "Network access requires approval. This command can reach external systems."

  on_unclassified:
    default: "deny"
    message: "Unclassified action. Requires human review or policy update."

# --- LOGGING ---
logging:
  path: "${HOME}/.config/agent-gate/logs"
  format: "jsonl"
  log_allowed: true
  log_denied: true
  log_vault_operations: true

# --- RATE LIMITS & CIRCUIT BREAKER ---
# Optional.  If omitted, no rate limiting is applied.
rate_limits:
  # Algorithm: "sliding_window" (default) or "token_bucket"
  algorithm: "sliding_window"

  # Per-tool limits (tool name matches the "command" field in actions)
  tools:
    # Read-only tools: generous limits
    cat:
      max_calls: 120
      window_seconds: 60
    ls:
      max_calls: 120
      window_seconds: 60
    grep:
      max_calls: 120
      window_seconds: 60
    read_file:
      max_calls: 120
      window_seconds: 60

    # Destructive tools: moderate limits
    write_file:
      max_calls: 30
      window_seconds: 60
      on_exceed: "escalate"
    mv:
      max_calls: 20
      window_seconds: 60
      on_exceed: "escalate"
    cp:
      max_calls: 30
      window_seconds: 60
      on_exceed: "escalate"

    # High-risk destructive: strict limits
    rm:
      max_calls: 10
      window_seconds: 60
      on_exceed: "deny"
      message: "rm rate limit exceeded.  Max 10 calls per 60s."
    chmod:
      max_calls: 5
      window_seconds: 60
      on_exceed: "deny"
    chown:
      max_calls: 5
      window_seconds: 60
      on_exceed: "deny"

    # Network tools: strict
    curl:
      max_calls: 10
      window_seconds: 60
      on_exceed: "escalate"
    wget:
      max_calls: 10
      window_seconds: 60
      on_exceed: "escalate"

  # Per-tier defaults (applied when no tool-specific limit exists)
  tier_defaults:
    read_only:
      max_calls: 120
      window_seconds: 60
      on_exceed: "deny"
    destructive:
      max_calls: 30
      window_seconds: 60
      on_exceed: "escalate"
    network:
      max_calls: 10
      window_seconds: 60
      on_exceed: "escalate"
    unclassified:
      max_calls: 10
      window_seconds: 60
      on_exceed: "deny"

  # Global limit (all tools combined)
  global:
    max_calls: 200
    window_seconds: 60
    on_exceed: "read_only"
    message: "Global rate limit exceeded.  Agent restricted to read-only."

  # Circuit breaker (derivative metric thresholds)
  circuit_breaker:
    enabled: true
    sliding_window_size: 20
    minimum_calls: 10
    failure_rate_threshold: 0.50
    slow_call_rate_threshold: 0.50
    slow_call_duration_seconds: 5.0
    wait_duration_open_seconds: 30
    permitted_calls_half_open: 3
    on_trip: "read_only"
    message: "Circuit breaker tripped.  Agent restricted to read-only."

  # Exponential backoff on repeated rate limit violations
  backoff:
    enabled: true
    initial_wait_seconds: 5
    multiplier: 2.0
    max_wait_seconds: 300
